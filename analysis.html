<script>
const D = JSON.parse(document.getElementById('analysis-data').textContent);
const KW = D.keywords, ARTS = D.articles;
Chart.defaults.font.family = "'PingFang TC','Microsoft JhengHei',sans-serif";
Chart.defaults.font.size = 12;
const ACCENT='#7a5641', ACCENT2='#a9774e';

const maxCount = KW[0]?.count||1;
const grid = document.getElementById('kw-grid');
KW.forEach((k,i) => {
  grid.innerHTML += `<div class="kw-item"><span class="kw-rank">${i+1}</span><span class="kw-word">${k.word}</span><div class="kw-bar-wrap"><div class="kw-bar" style="width:${Math.round(k.count/maxCount*100)}%"></div></div><span class="kw-count">${k.count}</span></div>`;
});

new Chart(document.getElementById('kwChart'),{type:'bar',data:{labels:KW.slice(0,20).map(k=>k.word),datasets:[{label:'出現次數',data:KW.slice(0,20).map(k=>k.count),backgroundColor:ACCENT,borderRadius:4}]},options:{indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{beginAtZero:true}}}});
new Chart(document.getElementById('kwArtChart'),{type:'bar',data:{labels:KW.slice(0,20).map(k=>k.word),datasets:[{label:'出現文章數',data:KW.slice(0,20).map(k=>k.articles),backgroundColor:ACCENT2,borderRadius:4}]},options:{indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{beginAtZero:true}}}});
new Chart(document.getElementById('sentChart'),{type:'line',data:{labels:D.weekLabels,datasets:[{label:'正面',data:D.sentPos,borderColor:'#5a8a5a',backgroundColor:'#5a8a5a',tension:.35,fill:false,pointRadius:4},{label:'中性',data:D.sentNeu,borderColor:'#9a8a76',backgroundColor:'#9a8a76',tension:.35,fill:false,pointRadius:4},{label:'負面',data:D.sentNeg,borderColor:'#c05a3e',backgroundColor:'#c05a3e',tension:.35,fill:false,pointRadius:4}]},options:{plugins:{tooltip:{callbacks:{title:ctx=>D.weekRanges[ctx[0].dataIndex]}}},scales:{y:{beginAtZero:true}}}});
new Chart(document.getElementById('totalChart'),{type:'bar',data:{labels:D.weekLabels,datasets:[{label:'文章總數',data:D.totalArts,backgroundColor:ACCENT,borderRadius:4}]},options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}});
new Chart(document.getElementById('mediaChart'),{type:'bar',data:{labels:D.weekLabels,datasets:[{label:'傳統媒體-本地',data:D.mediaLocalTrad,backgroundColor:'#7a5641'},{label:'網絡媒體-本地',data:D.mediaLocalWeb,backgroundColor:'#a9774e'},{label:'外媒',data:D.mediaForeign,backgroundColor:'#c9a06b'},{label:'離散媒體',data:D.mediaDiaspora,backgroundColor:'#9a7b86'}]},options:{scales:{x:{stacked:true},y:{stacked:true,beginAtZero:true}}}});

document.getElementById('art-total').textContent = ARTS.length;
const weeks=[...new Set(ARTS.map(a=>a.week))].sort().reverse();
const wSel=document.getElementById('filt-week');
weeks.forEach(w=>{wSel.innerHTML+=`<option>${w}</option>`;});
let sortCol=0,sortAsc=false,filtered=[...ARTS];
function sentBadge(s){return s==='正面'?'<span class="badge pos">正面</span>':s==='負面'?'<span class="badge neg">負面</span>':'<span class="badge neu">中性</span>';}
function origBadge(o){return o==='外媒'?'<span class="badge foreign">外媒</span>':o==='離散媒體'?'<span class="badge diaspora">離散</span>':'<span class="badge local">本地</span>';}
function renderTable(){
  document.getElementById('art-tbody').innerHTML=filtered.slice(0,500).map(a=>`<tr><td style="white-space:nowrap">${a.date||a.week}</td><td><a href="${a.url}" target="_blank">${a.title}</a></td><td style="white-space:nowrap">${a.source}</td><td>${origBadge(a.origin)}</td><td style="white-space:nowrap">${a.type}</td><td>${sentBadge(a.sent)}</td><td style="white-space:nowrap">${a.week}</td></tr>`).join('');
  document.getElementById('art-count').textContent=filtered.length>500?`顯示前 500 / ${filtered.length} 篇`:`共 ${filtered.length} 篇`;
}
function filterTable(){
  const q=document.getElementById('search').value.toLowerCase();
  const fo=document.getElementById('filt-origin').value,fs=document.getElementById('filt-sent').value,fw=document.getElementById('filt-week').value;
  filtered=ARTS.filter(a=>(!q||a.title.toLowerCase().includes(q)||a.source.toLowerCase().includes(q))&&(!fo||a.origin===fo)&&(!fs||a.sent===fs)&&(!fw||a.week===fw));
  renderTable();
}
function sortTable(col){
  const ths=document.querySelectorAll('th');ths.forEach(t=>t.className='');
  if(sortCol===col)sortAsc=!sortAsc;else{sortCol=col;sortAsc=true;}
  ths[col].className=sortAsc?'sorted-asc':'sorted-desc';
  const keys=['date','title','source','origin','type','sent','week'];
  filtered.sort((a,b)=>{const v=String(a[keys[col]]||'').localeCompare(String(b[keys[col]]||''),'zh-Hant');return sortAsc?v:-v;});
  renderTable();
}
document.querySelectorAll('nav a[href^="#"]').forEach(a=>{a.addEventListener('click',e=>{e.preventDefault();document.querySelector(a.getAttribute('href'))?.scrollIntoView({behavior:'smooth'});document.querySelectorAll('nav a').forEach(x=>x.classList.remove('active'));a.classList.add('active');});});
renderTable();
</script>
</body>
</html>
