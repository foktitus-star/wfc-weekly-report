const $ = id => document.getElementById(id);

if (!D.isDemo) $('demoBanner').style.display = 'none';
$('headerSub').textContent = `${D.weekLabel} ｜ ${D.dateRange} ｜ 生成日期：${D.generatedAt}`;
$('footerNote').textContent = `由 Claude 自動收集及整理 ｜ 數據截至 ${D.generatedAt} ｜ 關鍵字次數由腳本統計`;

const newsCount = D.articles.filter(a => a.type === '新聞' || a.type === '專題').length;
const forumCount = D.articles.filter(a => a.type === '論壇').length;
const manualCount = D.articles.filter(a => a.type === '手動').length;
const negPct = Math.round(D.sentiment.negative / (D.sentiment.positive + D.sentiment.neutral + D.sentiment.negative) * 100);
const stats = [
  [newsCount, '新聞／專題'],
  [forumCount, '論壇討論串'],
  [D.keywords.length, '追蹤關鍵字'],
  [negPct + '%', '負面輿情比例'],
];
if (manualCount) stats.splice(2, 0, [manualCount, '手動加入']);
$('statCards').innerHTML = stats.map(([n, l]) =>
  `<div class="stat"><div class="num">${n}</div><div class="lbl">${l}</div></div>`).join('');

$('summaryText').textContent = D.summary;
$('highlightList').innerHTML = (D.highlights || []).map(h => `<li>${h}</li>`).join('');

let kwSort = { key: 'count', dir: -1 };
let activeKeyword = null;

function renderKeywords() {
  const q = $('kwSearch').value.trim().toLowerCase();
  const max = Math.max(...D.keywords.map(k => k.count), 1);
  const rows = D.keywords
    .filter(k => !q || k.word.toLowerCase().includes(q))
    .sort((a, b) => (a[kwSort.key] > b[kwSort.key] ? 1 : -1) * kwSort.dir);
  $('kwBody').innerHTML = rows.length ? rows.map(k => `
    <tr class="kw-row ${k.word === activeKeyword ? 'active' : ''}" data-word="${k.word}">
      <td>${k.word}</td><td><strong>${k.count}</strong></td><td>${k.articles}</td>
      <td><div class="bar-bg"><div class="bar-fill" style="width:${k.count / max * 100}%"></div></div></td>
    </tr>`).join('')
    : `<tr><td colspan="4" class="empty">搵唔到「${$('kwSearch').value}」。呢個列表只包含當週統計咗嘅關鍵字。</td></tr>`;
  document.querySelectorAll('.kw-row').forEach(tr => tr.onclick = () => {
    activeKeyword = activeKeyword === tr.dataset.word ? null : tr.dataset.word;
    renderKeywords(); renderArticles();
  });
}
$('kwSearch').addEventListener('input', renderKeywords);
document.querySelectorAll('th[data-sort]').forEach(th => th.onclick = () => {
  const k = th.dataset.sort;
  kwSort = { key: k, dir: kwSort.key === k ? -kwSort.dir : (k === 'word' ? 1 : -1) };
  document.querySelectorAll('th[data-sort]').forEach(t => t.textContent = t.textContent.replace(/ [▾▴]/, ''));
  th.textContent += kwSort.dir === -1 ? ' ▾' : ' ▴';
  renderKeywords();
});

const types = ['全部', ...new Set(D.articles.map(a => a.type))];
let activeType = '全部';
$('typeTabs').innerHTML = types.map(t =>
  `<button class="tab ${t === '全部' ? 'active' : ''}" data-type="${t}">${t}</button>`).join('');
document.querySelectorAll('.tab').forEach(b => b.onclick = () => {
  activeType = b.dataset.type;
  document.querySelectorAll('.tab').forEach(x => x.classList.toggle('active', x === b));
  renderArticles();
});
$('clearFilter').onclick = () => { activeKeyword = null; renderKeywords(); renderArticles(); };

function renderArticles() {
  $('clearFilter').style.display = activeKeyword ? 'inline' : 'none';
  const list = D.articles.filter(a =>
    (activeType === '全部' || a.type === activeType) &&
    (!activeKeyword || (a.keywords || []).includes(activeKeyword)));
  $('articleList').innerHTML = list.length ? list.map(a => `
    <div class="article">
      <div style="flex:1">
        <span class="type-tag">${a.type}</span><a href="${a.url}" target="_blank" rel="noopener">${a.title}</a>
        <div class="meta">${a.source} ｜ ${a.date}${(a.keywords || []).length ? ' ｜ 關鍵字：' + a.keywords.join('、') : ''}</div>
      </div>
      <span class="badge ${a.sentiment}">${a.sentiment}</span>
    </div>`).join('')
    : `<div class="empty">冇符合條件嘅文章${activeKeyword ? `（關鍵字：${activeKeyword}）` : ''}。</div>`;
}

Chart.defaults.font.family = '"PingFang TC","Microsoft JhengHei",sans-serif';
new Chart($('dailyChart'), {
  type: 'bar',
  data: {
    labels: D.dailyCounts.map(d => d.date),
    datasets: [
      { label: '新聞／專題', data: D.dailyCounts.map(d => d.news), backgroundColor: '#1f4e79' },
      { label: '論壇討論', data: D.dailyCounts.map(d => d.forum), backgroundColor: '#7fa8c9' }
    ]
  },
  options: { maintainAspectRatio: false, scales: { x: { stacked: true }, y: { stacked: true, ticks: { precision: 0 } } } }
});
new Chart($('sentimentChart'), {
  type: 'doughnut',
  data: {
    labels: ['正面', '中性', '負面'],
    datasets: [{ data: [D.sentiment.positive, D.sentiment.neutral, D.sentiment.negative],
      backgroundColor: ['#2e8b57', '#b8c0cc', '#c0504d'] }]
  },
  options: { maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
});
new Chart($('sourceChart'), {
  type: 'bar',
  data: {
    labels: D.sources.map(s => s.name),
    datasets: [{ data: D.sources.map(s => s.count), backgroundColor: '#1f4e79' }]
  },
  options: { indexAxis: 'y', maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { precision: 0 } } } }
});

renderKeywords();
renderArticles();
</script>
</body>
</html>
